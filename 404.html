<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chyba 404 - Stránka nenalezena</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Shoelace for the requested wa-icon face-frown -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.14.0/cdn/themes/light.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.14.0/cdn/shoelace.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #f7f7f7;
            padding: 2rem;
        }

        .error-page wa-icon {
            font-size: 5rem;
            color: #ffbf00;
            margin-bottom: 2rem;
        }

        .error-page h1 {
            font-family: 'Special Elite', cursive;
        }
    </style>
</head>

<body>
    <div class="error-page">
        <wa-icon name="face-frown" variant="regular"></wa-icon>
        <h1>Jejda, tudy cesta nevede</h1>
        <p>Stránka, kterou hledáte, se bohužel ztratila. Můžeme vás ale nasměrovat zpět na hlavní stranu.</p>
        <a href="/" class="btn btn-primary mt-4">Vzít mě domů</a>
    </div>
</body>

</html>
